<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>שומרי התבלין - מאסטר</title><style>body{font-family:system-ui,Arial;margin:0;background:#f7efd9;color:#33271f;direction:rtl}.wrap{max-width:820px;margin:auto;padding:24px}.card{background:#fff9eb;border:1px solid #eadcc2;border-radius:20px;padding:18px;margin:12px 0}.card.main{border:2px solid #d88914}a{color:#0b7a93;word-break:break-all}button{padding:12px 16px;border:0;border-radius:12px;background:#d88914;color:#fff;font-weight:800;margin:10px 8px 0 0;cursor:pointer}</style></head><body><div class="wrap"><h1>שומרי התבלין — קישורי תחנות</h1><p>השתמש בקישורים האלה ליצירת QR לכל תחנה.</p><div id="main"></div><div id="links"></div></div><script>const CTA='היצורים נעלמו. סרקו, התחילו במסע ועזרו למצוא את שומרי התבלין.';const stations={tatzpit:'התצפית / אווירון',shomera:'שומרה / שומרון',beitbad:'בית בד / זייתון',gat:'גת / גתון',goren:'גורן / דישון',bor:'בור מים / בורי'};const base=location.origin+location.pathname.replace(/master\.html$/,'');function qrUrl(u){return 'https://api.qrserver.com/v1/create-qr-code/?size=900x900&data='+encodeURIComponent(u);}function card(title,u,isMain){return `<div class="card${isMain?' main':''}"><h2>${title}</h2><a href="${u}" target="_blank">${u}</a><br><button onclick="window.open('${qrUrl(u)}','_blank')">הצג QR</button><button onclick="navigator.clipboard.writeText('${u}')">העתק קישור</button></div>`;}document.getElementById('main').innerHTML=card(CTA,base,true);document.getElementById('links').innerHTML=Object.entries(stations).map(([k,v])=>{const u=base+'?station='+k;return card(v,u,false);}).join('');</script></body></html>
